<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gourob Jewellers</title>

<style>

body{
  font-family: Arial;
  background:#f3f3f3;
  margin:0;
  padding:10px;
}

/* TOP BAR */
.topbar{
  background:#fff;
  padding:10px;
  text-align:center;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#b8860b,#ffd700);
  color:#fff;
  text-align:center;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

.container{
  display:flex;
  gap:10px;
}

.box{
  flex:1;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
  transition:0.3s;
}

input:focus{
  border:1px solid gold;
  box-shadow:0 0 8px gold;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:linear-gradient(135deg,#ffd700,#e6c200);
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.resultBox{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.resultItem{
  background:#fff8dc;
  padding:8px;
  border-radius:8px;
  text-align:center;
  flex:1;
  font-size:13px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th{
  background:#ffd700;
}

a{
  text-decoration:none;
  font-weight:bold;
  margin:0 8px;
}

</style>
</head>

<body>

<!-- SOCIAL -->
<div class="topbar">
📲 Connect with Gourob Biswas <br><br>

<a href="https://www.facebook.com/share/1A1h4ZnvD4/" target="_blank">📘 Facebook</a>
<a href="https://www.instagram.com/imgourobb" target="_blank">📸 Instagram</a>
<a href="https://wa.me/919134807484" target="_blank">💬 WhatsApp</a>

</div>

<!-- HEADER -->
<div class="header">
💎 Gourob Goldsmith 🪙 <br>
<span id="datetime"></span>
</div>

<div class="container">

<div class="card box">

<h3>🪙 Gold Calculator</h3>

<label>গহনার ওজন</label>
<input type="number" id="weight" placeholder="যেমন 10 গ্রাম">

<label>সোনার পিউরিটি (%)</label>
<input type="number" id="purity" placeholder="যেমন 86">

<div class="resultBox" id="goldResult"></div>

</div>

<div class="card box">

<h3>💰 Gold Price</h3>

<label>প্রতি 1 গ্রামের দাম</label>
<input type="number" id="rate" placeholder="₹">

<label>কতটুকু সোনা নিয়েছো</label>
<input type="number" id="grams" placeholder="কতটুকু নিয়েছো">

<div id="priceResult"></div>

</div>

</div>

<div class="card">

<h3 style="text-align:center;">⚖️ আনা → গ্রাম লিস্ট</h3>

<table>
<tr><th>আনা</th><th>গ্রাম</th></tr>

<script>
let list=[1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10];
list.forEach(a=>{
document.write(`<tr><td>${a} আনা</td><td>${(a*0.728).toFixed(3)} g</td></tr>`);
});
</script>

</table>

</div>

<script>

/* DATE TIME */
function updateTime(){
let now=new Date();
document.getElementById("datetime").innerHTML=
now.toLocaleDateString('bn-IN')+" | "+now.toLocaleTimeString('bn-IN');
}
setInterval(updateTime,1000);
updateTime();

/* GOLD */
function goldCalc(){

let w=parseFloat(weight.value);
let p=parseFloat(purity.value);

if(isNaN(w)||isNaN(p)){
goldResult.innerHTML="";
return;
}

let pure=(w*p)/100;

goldResult.innerHTML=`
<div class="resultItem">24K<br>${(pure/1).toFixed(2)}g</div>
<div class="resultItem">22K<br>${(pure/0.916).toFixed(2)}g</div>
<div class="resultItem">21K<br>${(pure/0.875).toFixed(2)}g</div>
<div class="resultItem">20K<br>${(pure/0.833).toFixed(2)}g</div>
`;

}

/* PRICE */
function priceCalc(){

let r=parseFloat(rate.value);
let g=parseFloat(grams.value);

if(isNaN(r)||isNaN(g)){
priceResult.innerHTML="";
return;
}

let r22=r*0.916;

let base24=r*g;
let making24=base24*0.08;
let total24=base24+making24;

let base22=r22*g;
let making22=base22*0.08;
let total22=base22+making22;

priceResult.innerHTML=`
<table>
<tr><th>Type</th><th>Amount</th></tr>

<tr><td>24K Price</td><td>₹${base24.toFixed(0)}</td></tr>
<tr><td>Making (8%)</td><td>₹${making24.toFixed(0)}</td></tr>
<tr><td><b>Total</b></td><td><b>₹${total24.toFixed(0)}</b></td></tr>

<tr><td>22K Price</td><td>₹${base22.toFixed(0)}</td></tr>
<tr><td>Making (8%)</td><td>₹${making22.toFixed(0)}</td></tr>
<tr><td><b>Total</b></td><td><b>₹${total22.toFixed(0)}</b></td></tr>

</table>
`;

}

/* AUTO RUN */
weight.oninput=goldCalc;
purity.oninput=goldCalc;
rate.oninput=priceCalc;
grams.oninput=priceCalc;

</script>

</body>
</html>
