<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Calculator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,0.1);
flex:1;
min-width:280px;
}

input{
width:100%;
padding:8px;
margin:5px 0 10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#f4c200;
border:none;
font-weight:bold;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#f4c200;
}

</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">❤️ Gourob Biswas ❤️</h2>

<div class="row">

<div class="card">

<h3>Gold Calculator</h3>

<label>গহনার ওজন (গ্রাম)</label>
<input type="number" id="goldWeight">

<label>সোনার বিশুদ্ধতা (%)</label>
<input type="number" id="goldPurity">

<button onclick="calculateGold()">Calculate</button>

<table>

<tr>
<th>24K</th>
<th>22K</th>
<th>21K</th>
<th>20K</th>
<th>18K</th>
</tr>

<tr>
<td id="g24">-</td>
<td id="g22">-</td>
<td id="g21">-</td>
<td id="g20">-</td>
<td id="g18">-</td>
</tr>

</table>

</div>


<div class="card">

<h3>Gold Price</h3>

<label>২৪ ক্যারেট দাম (প্রতি গ্রাম)</label>
<input type="number" id="price24">

<label>কত গ্রাম</label>
<input type="number" id="gram">

<button onclick="calculatePrice()">Calculate</button>

<table>

<tr>
<th>Type</th>
<th>Amount</th>
</tr>

<tr>
<td>24K Price</td>
<td id="p24">-</td>
</tr>

<tr>
<td>22K Price</td>
<td id="p22">-</td>
</tr>

<tr>
<td>Making Charge (8%)</td>
<td id="making">-</td>
</tr>

<tr>
<td>Total Price</td>
<td id="total">-</td>
</tr>

</table>

</div>

</div>

</div>


<script>

function calculateGold(){

let w=parseFloat(document.getElementById("goldWeight").value);
let p=parseFloat(document.getElementById("goldPurity").value);

let pure=(w*p)/100;

document.getElementById("g24").innerHTML=(pure/1).toFixed(3)+" g";
document.getElementById("g22").innerHTML=(pure/0.916).toFixed(3)+" g";
document.getElementById("g21").innerHTML=(pure/0.875).toFixed(3)+" g";
document.getElementById("g20").innerHTML=(pure/0.833).toFixed(3)+" g";
document.getElementById("g18").innerHTML=(pure/0.750).toFixed(3)+" g";

}


function calculatePrice(){

let price=parseFloat(document.getElementById("price24").value);
let gram=parseFloat(document.getElementById("gram").value);

let price24=price*gram;
let price22=(price*0.916)*gram;

let making=price22*0.08;

let total=price22+making;

document.getElementById("p24").innerHTML="₹"+price24.toFixed(0);
document.getElementById("p22").innerHTML="₹"+price22.toFixed(0);
document.getElementById("making").innerHTML="₹"+making.toFixed(0);
document.getElementById("total").innerHTML="₹"+total.toFixed(0);

}

</script>

</body>
</html>
